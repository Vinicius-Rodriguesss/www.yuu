services:

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile.backend

    container_name: yuu-api

    ports:
      - "3000:3000"

    volumes:
      - ./backend:/app
      - /app/node_modules

    env_file:
      - .env

    depends_on:
      - postgres


  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend

    container_name: yuu-frontend

    ports:
      - "5173:5173"

    volumes:
      - .:/app
      - /app/node_modules

    depends_on:
      - api


  postgres:
    image: postgres:17-alpine

    container_name: yuu-postgres

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data


volumes:
  postgres_data: